<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1024" />
        <title>GDPT Demonlist</title>
        <link rel="preconnect" href="https://unpkg.com" />

        <!-- Replace your server icon by uploading an image file named "list_icon.png"-->
        <link rel="icon" href="/list_icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&amp;display=swap"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&amp;display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media='all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&amp;display=swap"
                rel="stylesheet"
            />
        </noscript>

        <!-- Preload CSS -->
        <link rel="preload" href="/css/reset.css" as="style" />
        <link rel="preload" href="/css/typography.css" as="style" />
        <link rel="preload" href="/css/main.css" as="style" />
        
        <link rel="stylesheet" type="text/css" href="/css/reset.css" />
        <link rel="stylesheet" type="text/css" href="/css/typography.css" />
        <link rel="stylesheet" type="text/css" href="/css/main.css" />
        <link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
        <link rel="stylesheet" type="text/css" href="/css/pages/leaderboard.css" media="print" onload="this.media='all'" />
        <link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" media="print" onload="this.media='all'" />
        <link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
        <link rel="stylesheet" type="text/css" href="/css/components/btn.css" media="print" onload="this.media='all'" />
        <link rel="stylesheet" type="text/css" href="/css/components/tabs.css" media="print" onload="this.media='all'" />
        
        <noscript>
            <link rel="stylesheet" type="text/css" href="/css/reset.css" />
            <link rel="stylesheet" type="text/css" href="/css/typography.css" />
            <link rel="stylesheet" type="text/css" href="/css/main.css" />
            <link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
            <link rel="stylesheet" type="text/css" href="/css/pages/leaderboard.css" />
            <link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
            <link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
            <link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
            <link rel="stylesheet" type="text/css" href="/css/components/tabs.css" />
        </noscript>
        <script defer src="https://unpkg.com/vue@3.2.31/dist/vue.global.prod.js"></script>
        <script defer src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
        
        <!-- Module Preloads -->
        <link rel="modulepreload" href="/js/main.js">
        <link rel="modulepreload" href="/js/routes.js">
        <link rel="modulepreload" href="/js/pages/List.js">
        <link rel="modulepreload" href="/js/content.js">
        <link rel="modulepreload" href="/js/score.js">
        <link rel="modulepreload" href="/js/util.js">
        <link rel="modulepreload" href="/js/components/Spinner.js">
        <link rel="modulepreload" href="/js/components/List/LevelAuthors.js">
        <link rel="preload" href="/data/_editors.json" as="fetch">

        <!-- Preload bundle -->
        <link rel="preload" href="/data/_list_bundled.json" as="fetch">
        <link rel="preload" href="/data/_list.json" as="fetch">

        <script defer type="module" src="/js/main.js"></script>
        <style>
            [v-cloak] { display: none !important; }
            html { background-color: var(--color-background, white); }
            html.dark { background-color: #1c1b1f; }
        </style>
        <script>
            (function() {
                try {
                    if (JSON.parse(localStorage.getItem('dark'))) {
                        document.documentElement.classList.add('dark');
                    }
                } catch (e) {}
            })();
        </script>
    </head>
    <body id="app" v-cloak>
        <header :class="{ dark: store.dark }">
            <div class="logo">
                <h2>GDPT Demonlist</h2>
                <p>v1.0.0</p>
            </div>
            <nav class="nav">
                <router-link class="nav__tab" to="/">
                    <span class="type-label-lg">List</span>
                </router-link>
                <router-link class="nav__tab" to="/leaderboard">
                    <span class="type-label-lg">Leaderboard</span>
                </router-link>
                <router-link class="nav__tab" to="/roulette">
                    <span class="type-label-lg">Roulette</span>
                </router-link>
                <a class="nav__tab" href="/admin">
                    <span class="type-label-lg">Admin</span>
                </a>
                <div class="nav__actions">
                    <button
                        class="nav__icon"
                        @click.prevent="store.toggleDark()"
                          aria-label="Toggle dark mode"
                      >
                          <img
                              :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'"
                              alt=""
                              width="24"
                              height="24"
                          />
                      </button>
                      <!-- Replace the '#' with your discord server's invite-->
                      <a class="nav__icon" href="https://discord.gg/9agBPJnFy4" aria-label="Join our Discord">
                          <img src="/assets/discord.svg" alt="Discord Logo" width="31" height="24" />
                    </a>
                    <!-- List record submission form, add a link to replace the '#' when putting a link to your list submission form-->
                    <a
                        class="nav__cta type-label-lg"
                        href="https://docs.google.com/forms/d/e/1FAIpQLSeMJMp8sPtr44t8rTf3hCgQ8sfOfkl_LzMA2EX_XMifP5wWAw/viewform?usp=sf_link"
                        target="_blank"
                        >Submit Record</a
                    >
                </div>
            </nav>
        </header>
        <router-view :class="{ dark: store.dark }"></router-view>
    </body>
</html>
